<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    window.TrackJS && TrackJS.install({ 
      token: "56fa91a9242d4e2ea700d269bec80953"

    });
  </script>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      try {
        if (firstNum === "" || secondNum === "")
          throw new ValidationError("Missing argument");
        if (operator === "/" && secondNum === "0")
          throw new ValidationError("Attempting to divide by 0");
        output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
      } catch (error) {
        if (error instanceof ValidationError) {
          console.error("Invalid Data:", error.message);
        } else if (error instanceof SyntaxError) {
          console.error("Syntax Error:", error.message);
        } else {
          throw error;
        }
      } finally {
        console.log("Operation Complete");
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish

    class ValidationError extends Error {
      constructor(message) {
        super(message);
        this.name = "ValidationError";
      }
    }
    
    function deepest() { console.trace(); }
    
    function deeper() { deepest(); }

    function deep() { deeper(); }

    function handleBtnClick(event) {
      const text = event.target.innerText;
      if (text === "Console Log") {
        console.log("Console Log Demo");
      } else if (text === "Console Error") {
        console.error("Console Error Demo");
      } else if (text === "Console Count") {
        console.count("Count Button");
      } else if (text === "Console Warn") {
        console.warn("Console Warn Button");
      } else if (text === "Console Assert") {
        const number = 2;
        console.assert(number === 3, {number, errorMsg: "The number does not equal 3"});
      } else if (text === "Console Clear") {
        console.clear();
      } else if (text === "Console Dir") {
        console.dir(event.target);
      } else if (text === "Console dirxml") {
        console.dirxml(event.target);
      } else if (text === "Console Group Start") {
        console.group();
      } else if (text === "Console Group End") {
        console.groupEnd();
      } else if (text === "Console Table") {
        console.table([
          {name: "Software Engineering", num: 110},
          {name: "Programming Languages: Principles and Paradigms", num: 130},
          {name: "Advanced Software Engineering", num: 112}
        ])
      } else if (text === "Start Timer") {
        console.time("Timer Button");
      } else if (text === "End Timer") {
        console.timeEnd("Timer Button");
      } else if (text === "Console Trace") {
        deep();
      } else if (text === "Trigger a Global Error") {
        boom();
      }
    }

    errorBtns.forEach(button => button.addEventListener("click", handleBtnClick));

    window.onerror = function() {
      console.log("Sadly an error happened my friend");
    }
  </script>
</body>

</html>
